<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Connected — SourcifyDigital</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f7fa;
            color: #1a1a2e;
        }
        .card {
            background: white;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
        }
        .check { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 24px; margin: 0 0 8px; }
        p { color: #666; margin: 0 0 24px; line-height: 1.6; }
        .btn {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✅</div>
        <h1>Bank Account Connected!</h1>
        <p>Your bank has been securely linked. You can close this window and return to Camila.</p>
        <p style="font-size: 13px; color: #999;">Run <code>python stripe_fc.py accounts</code> to see your linked accounts.</p>
    </div>
</body>
</html>
